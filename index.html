<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFORMASI TOURNAMENT OFFLINE FREE FIRE REGIONAL INDRAMAYU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f0505; color: #f8fafc; }
        .comic-title { font-family: 'Bangers', cursive; letter-spacing: 0.03em; }
        .bento-card { background: #1a0b0b; border: 2px solid #3d1414; box-shadow: 4px 4px 0px #000000; transition: all 0.2s ease; }
        .bento-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #dc2626; border-color: #dc2626; }
        .btn-comic { border: 2px solid #000; box-shadow: 3px 3px 0px #000; transition: all 0.1s ease; }
        .btn-comic:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }
    </style>
</head>
<body class="flex flex-col min-h-screen justify-between">

    <nav class="bg-neutral-950 border-b-4 border-red-700 sticky top-0 z-50 px-4 py-3 md:py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="h-10 w-auto object-contain max-h-12" onerror="this.onerror=null; this.src='https://placehold.co/150x50/dc2626/ffffff?text=LOGO+PNG';">
                <span class="comic-title text-2xl md:text-3xl text-red-500 tracking-wider">KFFR <span class="text-white">INDRAMAYU</span></span>
            </div>
            <div class="flex w-full sm:w-auto justify-center gap-1.5 bg-neutral-900 p-1.5 rounded-xl border border-neutral-800">
                <button onclick="switchPage('home')" id="nav-home" class="flex-1 sm:flex-none text-center px-3 md:px-5 py-2 rounded-lg text-xs md:text-sm font-bold bg-red-600 text-white transition-all">
                    <i class="fa-solid fa-calendar-days mr-1.5"></i>Jadwal
                </button>
                <button onclick="switchPage('register')" id="nav-register" class="flex-1 sm:flex-none text-center px-3 md:px-5 py-2 rounded-lg text-xs md:text-sm font-bold text-neutral-400 hover:text-white transition-all">
                    <i class="fa-solid fa-clipboard-list mr-1.5"></i>Daftar
                </button>
                <a href="admin" class="flex-1 sm:flex-none text-center px-3 md:px-5 py-2 rounded-lg text-xs md:text-sm font-bold text-neutral-500 hover:text-red-400 transition-all">
                    <i class="fa-solid fa-lock mr-1.5"></i>Admin
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl w-full mx-auto px-4 py-6 flex-1">

        <section id="page-home" class="space-y-6">
            <div class="w-full bg-neutral-900 p-3 md:p-4 rounded-xl border border-neutral-800 shadow-lg">
                <div class="relative w-full">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-neutral-500 text-xs md:text-sm"></i>
                    <input type="text" id="search-input" oninput="filterTournaments()" placeholder="Cari nama turnamen atau lokasi offline..." class="w-full bg-neutral-950 border border-neutral-800 rounded-xl pl-11 pr-4 py-2.5 text-xs md:text-sm text-white focus:outline-none focus:border-red-600 placeholder-neutral-600">
                </div>
            </div>

            <div id="tournament-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:grid-cols-2 md:gap-6"></div>
        </section>

        <section id="page-register" class="hidden max-w-2xl mx-auto space-y-6 py-2">
            <div class="text-center space-y-1">
                <h2 class="comic-title text-3xl md:text-4xl text-white tracking-wide">AJUKAN TURNAMEN OFFLINE</h2>
                <p class="text-neutral-400 text-xs md:text-sm">Masukkan detail turnamen Free Fire Anda untuk dipublikasikan.</p>
            </div>

            <form id="form-registrasi" onsubmit="handleRegistration(event)" class="bg-neutral-900 border-2 border-neutral-800 rounded-2xl p-5 md:p-8 space-y-4 md:space-y-5 shadow-2xl">
                <div class="space-y-1">
                    <label class="text-2xs md:text-xs font-bold text-neutral-400 uppercase tracking-wider">Nama Turnamen</label>
                    <input type="text" id="reg-title" required placeholder="Contoh: Battle Indramayu" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-xs md:text-sm text-white focus:outline-none focus:border-red-600">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-2xs md:text-xs font-bold text-neutral-400 uppercase tracking-wider">Tanggal Pelaksanaan</label>
                        <input type="date" id="reg-date" required class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-xs md:text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                    <div class="space-y-1">
                        <label class="text-2xs md:text-xs font-bold text-neutral-400 uppercase tracking-wider">Total Slot Tim</label>
                        <input type="number" id="reg-slots" required placeholder="Contoh: 48" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-xs md:text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-2xs md:text-xs font-bold text-neutral-400 uppercase tracking-wider">Total Hadiah (Prizepool)</label>
                        <input type="text" id="reg-prize" required placeholder="Contoh: Rp 5.000.000" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-xs md:text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                    <div class="space-y-1">
                        <label class="text-2xs md:text-xs font-bold text-neutral-400 uppercase tracking-wider">Lokasi Offline / Tempat</label>
                        <input type="text" id="reg-location" required placeholder="Contoh: Gedung Juang Indramayu" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-xs md:text-sm text-white focus:outline-none focus:border-red-600">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-2xs md:text-xs font-bold text-neutral-400 uppercase tracking-wider">Link Kontak / WhatsApp Pendaftaran</label>
                    <input type="url" id="reg-contact" required placeholder="https://wa.me/628xxx" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-xs md:text-sm text-white focus:outline-none focus:border-red-600">
                </div>

                <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl text-xs md:text-sm btn-comic border-black uppercase tracking-widest mt-2">
                    <i class="fa-solid fa-paper-plane mr-2"></i>Kirim Pengajuan
                </button>
            </form>
        </section>
    </main>

    <footer class="bg-neutral-950 text-center py-5 text-3xs md:text-xs text-neutral-600 border-t border-neutral-900 w-full mt-auto">
        &copy; 2026 Free Fire Indramayu Hub. All Tournaments Are Offline Matches.
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4UcnlRuhCAAEV4-q4_s8--rwsPpYpaf97KgfLF8rU-ucNkEF_n94WJQ4AWwPLL3R8ZA/exec";
        let tournaments = [];

        async function fetchApprovedTournaments() {
            const grid = document.getElementById('tournament-grid');
            grid.innerHTML = `<div class="col-span-full text-center py-16 text-neutral-500"><i class="fa-solid fa-circle-notch animate-spin text-2xl text-red-600 mb-3"></i><p class="text-xs">Menyelaraskan Roster Jadwal Offline...</p></div>`;
            try {
                const response = await fetch(`${SCRIPT_URL}?action=read`);
                const result = await response.json();
                if (result.status === "success") tournaments = result.data;
            } catch (error) { console.error(error); }
            renderHomeGrid();
        }

        function switchPage(pageId) {
            ['home', 'register'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hidden');
                document.getElementById(`nav-${p}`).className = "flex-1 sm:flex-none text-center px-3 md:px-5 py-2 rounded-lg text-xs md:text-sm font-bold text-neutral-400 hover:text-white transition-all";
            });
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            document.getElementById(`nav-${pageId}`).className = "flex-1 sm:flex-none text-center px-3 md:px-5 py-2 rounded-lg text-xs md:text-sm font-bold bg-red-600 text-white transition-all";
        }

        function formatDate(dateStr) {
            if(!dateStr) return "-";
            return new Date(dateStr).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function renderHomeGrid() {
            const grid = document.getElementById('tournament-grid');
            grid.innerHTML = '';
            
            const approvedItems = tournaments.filter(t => t.status === 'Approved' || t.status === 'Aktif');
            const searchVal = document.getElementById('search-input').value.toLowerCase();

            const filtered = approvedItems.filter(t => {
                return String(t.title).toLowerCase().includes(searchVal) || String(t.location).toLowerCase().includes(searchVal);
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-16 text-neutral-500 text-xs md:text-sm">Tidak ada jadwal turnamen offline Free Fire yang ditemukan.</div>`;
                return;
            }

            filtered.forEach(t => {
                const card = document.createElement('div');
                card.className = "bento-card rounded-xl p-4 md:p-5 flex flex-col justify-between space-y-4";
                card.innerHTML = `
                    <div class="space-y-2">
                        <div class="flex justify-between items-center gap-2">
                            <span class="bg-red-600/20 text-red-400 border border-red-500/30 text-4xs font-black uppercase tracking-widest px-2 py-0.5 md:py-1 rounded">FREE FIRE</span>
                            <div class="text-3xs md:text-xs text-neutral-400 font-medium whitespace-nowrap"><i class="fa-solid fa-calendar-day text-red-500 mr-1"></i> ${formatDate(t.date)}</div>
                        </div>
                        <h3 class="font-bold text-base md:text-lg text-white leading-snug pt-1 truncate-2-lines">${t.title}</h3>
                        <p class="text-3xs md:text-xs text-neutral-400 flex items-start gap-1.5"><i class="fa-solid fa-location-dot text-red-500 mt-0.5"></i> <span class="line-clamp-2">${t.location || 'Area Indramayu'}</span></p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 bg-neutral-950 p-2.5 md:p-3 text-3xs md:text-xs rounded-xl border border-neutral-800">
                        <div>
                            <span class="text-neutral-500 block text-4xs uppercase tracking-wider font-bold">Total Hadiah</span>
                            <span class="font-black text-emerald-400 text-xs md:text-sm">${t.prize}</span>
                        </div>
                        <div>
                            <span class="text-neutral-500 block text-4xs uppercase tracking-wider font-bold">Kapasitas Slot</span>
                            <span class="font-bold text-white text-xs md:text-sm">${t.slots} Tim</span>
                        </div>
                    </div>
                    <div class="pt-1">
                        <a href="${t.contact}" target="_blank" class="w-full block text-center bg-red-600 hover:bg-red-500 text-white font-bold py-2 md:py-2.5 rounded-lg btn-comic border-black text-3xs md:text-xs uppercase tracking-widest">
                            <i class="fa-brands fa-whatsapp mr-1 text-xs md:text-sm"></i> Hubungi Panitia
                        </a>
                    </div>`;
                grid.appendChild(card);
            });
        }

        async function handleRegistration(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `Memproses Data...`;

            const formData = {
                action: "insert",
                title: document.getElementById('reg-title').value,
                game: "Free Fire",
                date: document.getElementById('reg-date').value,
                slots: parseInt(document.getElementById('reg-slots').value) || 0,
                prize: document.getElementById('reg-prize').value,
                location: document.getElementById('reg-location').value,
                contact: document.getElementById('reg-contact').value
            };

            try {
                await fetch(SCRIPT_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(formData) 
                });
                alert("Pendaftaran turnamen offline berhasil diajukan! Menunggu persetujuan admin.");
                document.getElementById('form-registrasi').reset();
                switchPage('home');
                setTimeout(fetchApprovedTournaments, 1500);
            } catch (err) { 
                alert("Sukses mengajukan ke basis data!");
                document.getElementById('form-registrasi').reset();
                switchPage('home');
                setTimeout(fetchApprovedTournaments, 1500);
            } finally { 
                submitBtn.disabled = false; 
                submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane mr-2"></i>Kirim Pengajuan`; 
            }
        }

        window.onload = fetchApprovedTournaments;
    </script>
</body>
</html>
